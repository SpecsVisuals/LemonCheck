# docker-compose.yml
#
# Local development environment for LemonCheck.
# Runs the FastAPI backend on port 8000.
# The React frontend is run separately via `npm run dev` (Vite dev server on 5173).
#
# Usage:
#   docker-compose up       — start backend
#   docker-compose down     — stop and remove containers

version: "3.9"
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
